apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: llm-sim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        role: gateway
    spec:
      containers:
        - name: gateway
          image: llm-gateway:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: gateway-config
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: llm-sim
spec:
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
